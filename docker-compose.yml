services:
  api:
    build: .
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@db:5432/rag
    depends_on:
      - db

  db:
    image: postgres:16
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: rag
    # ports:
    #   - "5432:5432"  # WSL2 port forwarding 問題，暫時不對外開放；容器間透過 Docker network 通訊
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
